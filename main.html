<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	 <link rel="stylesheet"
        href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

</head>

<body>
	 <div class="container mt-5">

        <h1 class="text-center">Internship Form</h1>

        <form class="needs-validation" novalidate>

            <div class="row">

                <!-- First Name -->
                <div class="col-md-4 mb-3">
                    <label for="first-name-input" class="form-label">
                        First Name
                    </label>

                    <input type="text"
                        id="first-name-input"
                        class="form-control"
                        required>

                    <div class="invalid-feedback">
                        First name required!
                    </div>
                </div>

                <!-- Last Name -->
                <div class="col-md-4 mb-3">
                    <label for="last-name-input" class="form-label">
                        Last Name
                    </label>

                    <input type="text"
                        id="last-name-input"
                        class="form-control"
                        required>

                    <div class="invalid-feedback">
                        Last name required!
                    </div>
                </div>

                <!-- Email -->
                <div class="col-md-4 mb-3">
                    <label for="email-input" class="form-label">
                        Email Address
                    </label>

                    <input type="email"
                        id="email-input"
                        class="form-control"
                        placeholder="xyz@abc.com"
                        required>

                    <div class="invalid-feedback">
                        Email required!
                    </div>
                </div>

            </div>

            <div class="row">

                <!-- College -->
                <div class="col-md-4 mb-3">
                    <label for="college-input" class="form-label">
                        College
                    </label>

                    <input type="text"
                        id="college-input"
                        class="form-control"
                        required>

                    <div class="invalid-feedback">
                        Please provide a valid college.
                    </div>
                </div>

                <!-- Graduation Year -->
                <div class="col-md-4 mb-3">
                    <label for="grad-year-select" class="form-label">
                        Graduation Year
                    </label>

                    <select id="grad-year-select"
                        class="form-select"
                        required>

                        <option value="">Choose...</option>
                        <option>2020</option>
                        <option>2021</option>
                        <option>2022</option>
                        <option>2023</option>

                    </select>

                    <div class="invalid-feedback">
                        Please select a valid Graduation Year.
                    </div>
                </div>

                <!-- Roll No -->
                <div class="col-md-4 mb-3">
                    <label for="roll-no-input" class="form-label">
                        Roll No.
                    </label>

                    <input type="text"
                        id="roll-no-input"
                        class="form-control"
                        required>

                    <div class="invalid-feedback">
                        Please provide a valid Roll no.
                    </div>
                </div>

            </div>

            <!-- Checkbox -->
            <div class="form-check mb-3">

                <input type="checkbox"
                    id="conditions-checkbox"
                    class="form-check-input"
                    required>

                <label for="conditions-checkbox"
                    class="form-check-label">

                    Agree to terms and conditions

                </label>

                <div class="invalid-feedback">
                    You must agree before submitting.
                </div>

            </div>

            <!-- Submit -->
            <button type="submit"
                class="btn btn-primary">

                Submit form

            </button>

        </form>

    </div>

	<!-- the entire body must be written by student -->
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
