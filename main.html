<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>

<body>
	<h1 style="text-align:center">Internship Form</h1>
	<form class="form-inline" >
		<div>
			<label for="first-name-input">First Name</label>
		<input type="text" id="first-name-input" required>
		<label for="last-name-input">Last Name</label>
		<input type="text" id="last-name-input" required>
		<label for="email-input">Email Address</label>
		<input type="email" id="email-input" required>
		</div><br>
		<div>
			<label for="college-input">College Name</label>
			<input id="college-input" type="text" required>
			<label for="graduation">Graduation Year</label>
			<select placeholder="choose.." id="graduation" required>
				<option >2020</option>
				<option >2021</option>
				<option >2022</option>
				<option >2023</option>
			</select>
			<label for="roll-no-input">Roll No.</label>
			<input type="number" id="roll-no-input" required>
			
		</div><br>
		<div>
				<input type="checkbox" required id="conditions-checkbox">
			<label for="conditions-checkbox"> Agree to terms and condition you must agree before submitting</label> 
		<br><br>
			<button type="button" class="btn btn-primary">Submit form</button>
		</div>
		
	</form>
	<!-- the entire body must be written by student -->
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
